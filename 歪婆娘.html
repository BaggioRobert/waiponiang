<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>歪婆娘冷吃</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            background: #f5f5f5;
            padding: 12px;
            padding-bottom: 100px;
        }
        .shop-name {
            font-size: 22px;
            font-weight: 700;
            color: #222;
            padding: 10px 0 6px 4px;
        }
        .shop-sub {
            font-size: 13px;
            color: #999;
            padding-bottom: 16px;
            border-bottom: 1px solid #eee;
            margin-bottom: 16px;
            padding-left: 4px;
        }

        .product-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            margin-bottom: 16px;
            display: flex;
            padding: 14px;
            align-items: center;
            gap: 14px;
        }
        .product-img {
            width: 90px;
            height: 90px;
            border-radius: 12px;
            background: #e8e8e8;
            flex-shrink: 0;
            object-fit: cover;
            display: block;
        }
        .product-info {
            flex: 1;
            min-width: 0;
        }
        .product-name {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            line-height: 1.4;
        }
        .product-spec {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }
        .product-price {
            font-size: 18px;
            font-weight: 700;
            color: #ff3b30;
            margin-top: 6px;
        }
        .product-price small {
            font-size: 12px;
            font-weight: 400;
            color: #999;
            margin-left: 4px;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }
        .qty-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            font-size: 20px;
            font-weight: 400;
            cursor: pointer;
            background: #f0f0f0;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
            touch-action: manipulation;
        }
        .qty-btn:active {
            background: #ddd;
            transform: scale(0.92);
        }
        .qty-btn.add {
            background: #ff3b30;
            color: #fff;
        }
        .qty-btn.add:active {
            background: #d92d23;
        }
        .qty-num {
            font-size: 18px;
            font-weight: 600;
            min-width: 28px;
            text-align: center;
            color: #1a1a1a;
        }

        .float-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            padding: 12px 20px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.10);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 999;
            border-top: 1px solid #f0f0f0;
        }
        .float-total {
            font-size: 15px;
            color: #555;
        }
        .float-total strong {
            font-size: 20px;
            color: #ff3b30;
            font-weight: 700;
        }
        .float-btn {
            background: #ff3b30;
            color: #fff;
            border: none;
            padding: 10px 28px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            transition: 0.15s;
            box-shadow: 0 4px 12px rgba(255, 59, 48, 0.35);
        }
        .float-btn:active {
            transform: scale(0.95);
            background: #d92d23;
        }
        .float-btn:disabled {
            opacity: 0.5;
            box-shadow: none;
            transform: none;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: #fff;
            border-radius: 20px;
            max-width: 420px;
            width: 100%;
            max-height: 80vh;
            padding: 24px 20px 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalIn 0.2s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            padding-bottom: 14px;
            border-bottom: 1px solid #eee;
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
            max-height: 50vh;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.8;
            color: #222;
        }
        .modal-body .empty-tip {
            color: #aaa;
            text-align: center;
            padding: 30px 0;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }
        .modal-actions button {
            flex: 1;
            padding: 12px 0;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
        }
        .modal-actions .btn-copy {
            background: #ff3b30;
            color: #fff;
            box-shadow: 0 4px 12px rgba(255, 59, 48, 0.3);
        }
        .modal-actions .btn-copy:active {
            background: #d92d23;
        }
        .modal-actions .btn-close {
            background: #f0f0f0;
            color: #555;
        }
        .modal-actions .btn-close:active {
            background: #ddd;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #bbb;
            font-size: 15px;
        }

        /* 自定义提示 */
        .custom-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 16px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            z-index: 9999;
            max-width: 320px;
            text-align: center;
            backdrop-filter: blur(4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            animation: modalIn 0.2s ease;
        }
    </style>
</head>
<body>

    <div class="shop-name">🌶️ 歪婆娘冷吃</div>
    <div class="shop-sub">自贡盐帮菜 · 新鲜现做 · 真空包装</div>

    <div id="productList"></div>

    <div class="float-bar">
        <div class="float-total">
            已选 <strong id="totalCount">0</strong> 件 &nbsp;|&nbsp; 合计 <strong id="totalPrice">¥0.00</strong>
        </div>
        <button class="float-btn" id="viewBtn">📋 选好了，点我</button>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <div class="modal-title">📦 订单明细</div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-actions">
                <button class="btn-close" id="modalClose">关闭</button>
                <button class="btn-copy" id="modalCopy">📋 复制订单</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // ★★★ 商品数据（全部替换成你的真实图片链接） ★★★
        // ============================================================
        const products = [
            { id: 1, name: '冷吃兔（原味）', spec: '200克/袋', price: 27, img: 'https://picsum.photos/seed/tu1/200/200' },
            { id: 2, name: '冷吃兔（微辣）', spec: '200克/袋', price: 27, img: 'https://picsum.photos/seed/tu2/200/200' },
            { id: 3, name: '冷吃牛肉', spec: '170克/袋', price: 35, img: 'https://picsum.photos/seed/beef1/200/200' },
            { id: 4, name: '麻辣牛肉丝', spec: '170克/袋', price: 35, img: 'https://picsum.photos/seed/beef2/200/200' },
            { id: 5, name: '冷香兔（五香蒜蓉味）', spec: '200克/袋', price: 29, img: 'https://picsum.photos/seed/tu3/200/200' },
            { id: 6, name: '五香牛肉', spec: '150克/袋', price: 36, img: 'https://picsum.photos/seed/beef3/200/200' },
            { id: 7, name: '香辣掌中宝', spec: '120克/袋', price: 26, img: 'https://picsum.photos/seed/zhang/200/200' },
            { id: 8, name: '吮指鸭舌', spec: '150克/袋', price: 36, img: 'https://picsum.photos/seed/duck/200/200' },
            { id: 9, name: '香辣兔头', spec: '2只/袋', price: 31, img: 'https://picsum.photos/seed/head1/200/200' },
            { id: 10, name: '勺魂兔腿', spec: '2只/袋', price: 28, img: 'https://picsum.photos/seed/leg/200/200' },
            { id: 11, name: '怪味酥（散装）', spec: '150克/袋', price: 12, img: 'https://picsum.photos/seed/guai/200/200' },
            { id: 12, name: '野生小鱼', spec: '200克/袋', price: 28, img: 'https://picsum.photos/seed/fish1/200/200' },
            { id: 13, name: '冷吃鱼丁', spec: '200克/袋', price: 22, img: 'https://picsum.photos/seed/fish2/200/200' },
            { id: 14, name: '香辣鸡尖', spec: '170克/袋', price: 19, img: 'https://picsum.photos/seed/chicken/200/200' },
            { id: 15, name: '香辣小龙虾（拍四发五）', spec: '150克/袋', price: 28, img: 'https://picsum.photos/seed/lobster/200/200' },
            { id: 16, name: '花椒兔', spec: '150克/袋', price: 20, img: 'https://picsum.photos/seed/huajiao/200/200' },
            { id: 17, name: '冷吃猪尾', spec: '200克/袋', price: 27, img: 'https://picsum.photos/seed/pig/200/200' },
            { id: 18, name: '香辣鸭心', spec: '100克/袋', price: 13, img: 'https://picsum.photos/seed/heart/200/200' },
            { id: 19, name: '礼盒', spec: '1个', price: 5, img: 'https://picsum.photos/seed/gift/200/200' }
        ];

        // ============================================================
        // 状态与渲染（与之前逻辑完全相同）
        // ============================================================
        const cart = {};

        function renderProducts() {
            const container = document.getElementById('productList');
            container.innerHTML = '';
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2290%22 height=%2290%22%3E%3Crect fill=%22%23ddd%22 width=%2290%22 height=%2290%22/%3E%3Ctext x=%2230%22 y=%2248%22 font-size=%2214%22 fill=%22%23999%22%3E图%3C/text%3E%3C/svg%3E'" />
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-spec">${p.spec}</div>
                        <div class="product-price">¥${p.price} <small>/ 袋</small></div>
                        <div class="qty-control">
                            <button class="qty-btn" data-id="${p.id}" data-action="dec">−</button>
                            <span class="qty-num" id="qty-${p.id}">${cart[p.id] || 0}</span>
                            <button class="qty-btn add" data-id="${p.id}" data-action="inc">+</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            container.addEventListener('click', (e) => {
                const btn = e.target.closest('.qty-btn');
                if (!btn) return;
                const id = parseInt(btn.dataset.id);
                const action = btn.dataset.action;
                if (action === 'inc') {
                    cart[id] = (cart[id] || 0) + 1;
                } else if (action === 'dec') {
                    if (cart[id] && cart[id] > 0) {
                        cart[id] -= 1;
                        if (cart[id] === 0) delete cart[id];
                    }
                }
                updateUI();
            });
        }

        function updateUI() {
            let totalQty = 0, totalPrice = 0;
            products.forEach(p => {
                const qty = cart[p.id] || 0;
                const el = document.getElementById(`qty-${p.id}`);
                if (el) el.textContent = qty;
                totalQty += qty;
                totalPrice += qty * p.price;
            });
            document.getElementById('totalCount').textContent = totalQty;
            document.getElementById('totalPrice').textContent = `¥${totalPrice.toFixed(2)}`;
            document.getElementById('viewBtn').disabled = totalQty === 0;
        }

        function getOrderText() {
            const lines = [];
            let total = 0, count = 0;
            products.forEach(p => {
                const qty = cart[p.id] || 0;
                if (qty > 0) {
                    const subtotal = qty * p.price;
                    total += subtotal;
                    count += qty;
                    lines.push(`${p.name}  × ${qty}  = ¥${subtotal.toFixed(2)}  (${p.spec})`);
                }
            });
            if (lines.length === 0) return '（暂无商品）';
            lines.push(`─────────────────`);
            lines.push(`合计：${count} 件  ｜  总价：¥${total.toFixed(2)}`);
            return lines.join('\n');
        }

        function showModal() {
            const body = document.getElementById('modalBody');
            const text = getOrderText();
            body.innerHTML = text.replace(/\n/g, '<br>');
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function copyOrder() {
            const text = getOrderText();
            if (text === '（暂无商品）') return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('✅ 已复制，去粘贴给老板吧！');
                }).catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            ta.style.top = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                showToast('✅ 已复制，去粘贴给老板吧！');
            } catch (e) {
                showToast('❌ 复制失败，请手动复制');
            }
            document.body.removeChild(ta);
        }

        function showToast(msg) {
            const old = document.querySelector('.custom-toast');
            if (old) old.remove();
            const div = document.createElement('div');
            div.className = 'custom-toast';
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => {
                div.style.opacity = '0';
                div.style.transition = 'opacity 0.3s';
                setTimeout(() => div.remove(), 400);
            }, 1800);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            updateUI();
            document.getElementById('viewBtn').addEventListener('click', showModal);
            document.getElementById('modalClose').addEventListener('click', closeModal);
            document.getElementById('modalCopy').addEventListener('click', copyOrder);
            document.getElementById('modal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeModal();
            });
        });
    </script>
</body>
</html>
